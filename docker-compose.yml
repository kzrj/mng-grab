# На слабой машине сначала соберите по одному: docker compose build backend && docker compose build expo
# затем: docker compose up
services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  db:
    image: postgres:16.3-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mng_grab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-mng_grab}"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - ENV=${ENV:-development}
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mng_grab}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build: ./backend
    command: ["celery", "-A", "worker", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - ENV=${ENV:-development}
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mng_grab}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build: ./backend
    command: ["celery", "-A", "worker", "beat", "--loglevel=info"]
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - ENV=${ENV:-development}
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mng_grab}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Сервер разработки Expo (Metro + Dev Tools). Для доступа с телефона задайте EXPO_PACKAGER_HOSTNAME=IP_ВАШЕГО_СЕРВЕРА
  expo:
    build: ./ubgrab
    command: ["npx", "expo", "start"]
    env_file: .env
    ports:
      - "8081:8081"   # Metro bundler
      - "19000:19000" # Expo Dev Tools
      - "19001:19001" # Expo Dev Tools (legacy)
    volumes:
      - ./ubgrab:/app
      # Боевой: node_modules из образа (npm ci при сборке). Для локальной разработки на Windows см. dc_local.yml
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - CI=1
      # IP или hostname сервера, чтобы QR-код и приложение подключались к правильному хосту (задайте на сервере или в .env)
      - EXPO_PACKAGER_HOSTNAME=${EXPO_PACKAGER_HOSTNAME:-localhost}
      # URL бэкенда для приложения (без /api/v1). На сервере: http://IP:8000 или https://домен
      - EXPO_PUBLIC_API_BASE=${EXPO_PUBLIC_API_BASE:-http://192.168.0.14:8000}
    stdin_open: true
    tty: true

volumes:
  postgres_data:
